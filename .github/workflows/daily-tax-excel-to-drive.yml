name: Daily Tax Excel to Google Drive

on:
  schedule:
    # KST 12:00 = UTC 03:00
    - cron: "0 3 * * *"
    # KST 18:00 = UTC 09:00
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Generate dates
        id: dates
        run: |
          FROM="2025-12-01"
          TO=$(date -d "+60 days" +%F)
          TODAY=$(date +%F)
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "to=$TO" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone for Google Drive (Service Account)
        run: |
          mkdir -p ~/.config/rclone

          # ✅ JSON이 깨지는 것 방지(heredoc)
          cat > ~/.config/rclone/sa.json << 'EOF'
          ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          EOF

          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [gdrive]
          type = drive
          scope = drive
          service_account_file = ~/.config/rclone/sa.json
          EOF

      - name: Download tax excel
        run: |
          FROM="${{ steps.dates.outputs.from }}"
          TO="${{ steps.dates.outputs.to }}"
          TODAY="${{ steps.dates.outputs.today }}"

          URL="https://bonus-inout.vercel.app/api/tax/excel?from=${FROM}&to=${TO}&outCats=급여,세금,기타"
          FILENAME="세무사_통합_${FROM}_${TO}_생성일_${TODAY}.xlsx"

          echo "Downloading: $URL"
          curl -L --fail -o "$FILENAME" "$URL"
          ls -al

      - name: Upload to Google Drive (Shared Drive folder)
        run: |
          FROM="${{ steps.dates.outputs.from }}"
          TO="${{ steps.dates.outputs.to }}"
          TODAY="${{ steps.dates.outputs.today }}"
          FILENAME="세무사_통합_${FROM}_${TO}_생성일_${TODAY}.xlsx"

          DEST="gdrive:Supabase-Backup/bonus-inout/excel-tax"
          rclone copy "$FILENAME" "$DEST" -P

          echo "Uploaded: $DEST/$FILENAME"
