name: Daily Tax Excel to Google Drive

on:
  schedule:
    - cron: "10 15 * * *" # 매일 00:10 KST (UTC 15:10)
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Generate today date
        id: today
        run: echo "date=$(date +%F)" >> $GITHUB_OUTPUT

      - name: Download tax excel
        run: |
          TODAY="${{ steps.today.outputs.date }}"
          URL="https://bonus-inout.vercel.app/api/tax/excel?from=${TODAY}&to=${TODAY}&outCats=급여,세금,기타"
          FILENAME="세무사_통합_${TODAY}_${TODAY}.xlsx"
          echo "Downloading ${URL}"
          curl -L --fail -o "$FILENAME" "$URL"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (service account)
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_SA_JSON" > /tmp/sa.json

          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          EOF

      - name: Upload to Shared Drive folder
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SHARED_DRIVE_ID: ${{ secrets.GDRIVE_SHARED_DRIVE_ID }}
        run: |
          TODAY="${{ steps.today.outputs.date }}"
          FILENAME="세무사_통합_${TODAY}_${TODAY}.xlsx"

rclone copyto "$FILENAME" "gdrive:${GDRIVE_FOLDER_ID}/${FILENAME}" \
  --drive-shared-drive-id "${GDRIVE_SHARED_DRIVE_ID}" \
  --drive-use-trash=false \
  --retries 3
