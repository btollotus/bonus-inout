
name: Daily Tax Excel to Google Drive

on:
  schedule:
    - cron: "10 15 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Set timezone to Asia/Seoul
        run: sudo timedatectl set-timezone Asia/Seoul

      - name: Generate today date
        id: today
        run: echo "date=$(date +%F)" >> $GITHUB_OUTPUT

      - name: Download tax excel
        run: |
          TODAY="${{ steps.today.outputs.date }}"
          URL="https://bonus-inout.vercel.app/api/tax/excel?from=${TODAY}&to=${TODAY}&outCats=급여,세금,기타"

          FILENAME="세무사_통합_${TODAY}_${TODAY}.xlsx"

          echo "Downloading ${URL}"
          curl -L --fail -o "$FILENAME" "$URL"

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_SA_JSON" > /tmp/sa.json

          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = /tmp/sa.json
          EOF

      - name: Upload to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          TODAY=$(date +%F)
          FILENAME="세무사_통합_${TODAY}_${TODAY}.xlsx"

          rclone copyto "$FILENAME" "gdrive:{${GDRIVE_FOLDER_ID}}/${FILENAME}" \
            --drive-use-trash=false \
            --retries 3
